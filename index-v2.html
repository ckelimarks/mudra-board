<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invisible Whiteboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- MediaPipe via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    #svgOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
    }

    #svgOverlay text {
      pointer-events: all;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #toolbar button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    #toolbar button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #toolbar button.active {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.4), rgba(220, 38, 38, 0.5));
      border-color: rgba(239, 68, 68, 0.8);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.5), 0 0 40px rgba(239, 68, 68, 0.2);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.5), 0 0 40px rgba(239, 68, 68, 0.2);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 25px rgba(239, 68, 68, 0.7), 0 0 50px rgba(239, 68, 68, 0.3);
        transform: scale(1.02);
      }
    }

    #toolbar button i {
      width: 16px;
      height: 16px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #toolbar button.active i {
      animation: mic-bounce 0.6s ease-out;
    }

    @keyframes mic-bounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.3) rotate(-5deg); }
      50% { transform: scale(0.9) rotate(5deg); }
      70% { transform: scale(1.1) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    #toolbar input[type="color"] {
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #toolbar input[type="range"] {
      width: 80px;
      accent-color: #fff;
    }

    #speechIndicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(239, 68, 68, 0.2);
      border-radius: 6px;
      color: #ef4444;
      font-size: 12px;
      font-weight: 500;
    }

    #speechIndicator .pulse {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .divider {
      width: 1px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
    }

    /* Ripple effect for button clicks */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      transform: scale(0);
      animation: ripple-animation 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes ripple-animation {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <!-- Hidden video source for MediaPipe -->
  <video id="inputVideo" autoplay playsinline style="display:none"></video>

  <!-- Canvas for video background -->
  <canvas id="outputCanvas"></canvas>

  <!-- SVG overlay for interactive annotations -->
  <svg id="svgOverlay" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- Floating toolbar -->
  <div id="toolbar">
    <input type="color" id="colorPicker" value="#FF0000" title="Color">
    <input type="range" id="brushSize" min="2" max="20" value="5" title="Size">
    <div class="divider"></div>
    <button id="undoBtn"><i data-lucide="undo-2"></i></button>
    <button id="clearBtn"><i data-lucide="trash-2"></i></button>
    <div class="divider"></div>
    <button id="speechToggle"><i data-lucide="mic-off"></i><span>Speech</span></button>
    <div class="divider"></div>
    <button id="exportSVG"><i data-lucide="download"></i></button>
    <button id="helpBtn"><i data-lucide="help-circle"></i></button>
    <span id="speechIndicator" class="hidden"><span class="pulse"></span>Listening</span>
  </div>

  <!-- Interim speech preview -->
  <div id="speechPreview" class="hidden"></div>

  <!-- Loading overlay -->
  <div id="loadingOverlay">
    <div class="loader"></div>
    <span>Initializing hand tracking...</span>
  </div>

  <!-- Instructions overlay -->
  <div id="instructions" class="hidden">
    <div class="instructions-content">
      <h2>Controls</h2>
      <div class="instruction-grid">
        <div class="instruction">
          <span class="key">Pinch</span>
          <span class="desc">Draw or speak-to-place text</span>
        </div>
        <div class="instruction">
          <span class="key">Pinch + Drag</span>
          <span class="desc">Move existing text</span>
        </div>
        <div class="instruction">
          <span class="key">Open Palm</span>
          <span class="desc">Rotate canvas</span>
        </div>
        <div class="instruction">
          <span class="key">Two Hands</span>
          <span class="desc">Pan canvas</span>
        </div>
      </div>
      <button id="dismissInstructions">Got it</button>
    </div>
  </div>

  <script type="module" src="js/main-v2.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body>
</html>
